# Render Blueprint — CareerPilot V2
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: careerpilot
    runtime: docker
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./career_pilot.db
